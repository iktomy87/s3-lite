spring:
  application:
    name: s3lite-backend

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:s3lite}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

s3lite:
  storage:
    root: ${STORAGE_ROOT:./s3-data}
  jwt:
    secret: ${JWT_SECRET:s3lite-default-dev-secret-change-in-production-must-be-256bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 h

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
