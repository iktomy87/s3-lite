spring:
  datasource:
    url: jdbc:h2:mem:s3litetestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

s3lite:
  storage:
    root: ./s3-data-test
  jwt:
    secret: test-secret-must-be-at-least-256-bits-long-for-hmac
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
