<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="left-panel">
            <h1>Impressive<br>React Login Page<br>Template</h1>
            <div class="brand-logo-bottom">
                <span class="theme">THEME</span><span class="selection">SELECTION</span>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-card">

                <div class="card-logo">
                    <div class="logo-icon"></div>
                    <span class="logo-text">sneat</span>
                </div>

                <h2>Welcome to Sneat! 👋</h2>
                <p class="subtitle">Please sign-in to your account and start the adventure</p>

                <form>
                    <div class="input-group">
                        <label for="email">EMAIL OR USERNAME</label>
                        <input type="text" id="email" placeholder="Enter your email or username">
                    </div>

                    <div class="input-group">
                        <div class="password-labels">
                            <label for="password">PASSWORD</label>
                            <a href="#" class="forgot-link">Forgot Password?</a>
                        </div>
                        <div class="input-icon-wrapper">
                            <input type="password" id="password" placeholder="············">
                            <span class="eye-icon">👁️</span>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember Me</label>
                    </div>

                    <button type="submit" class="btn-primary">Sign in</button>
                </form>

                <p class="register-text">
                    New on our platform? <a href="#">Create an account</a>
                </p>

                <div class="divider">
                    <span>or</span>
                </div>

                <div class="social-buttons">
                    <button class="btn-social fb">f</button>
                    <button class="btn-social gp">g+</button>
                    <button class="btn-social tw">t</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
