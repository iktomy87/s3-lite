services:

  postgres:
    image: postgres:16-alpine
    container_name: s3lite-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-s3lite}
      POSTGRES_USER: ${POSTGRES_USER:-s3lite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-s3lite} -d ${POSTGRES_DB:-s3lite}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - s3lite-net

  backend:
    image: eclipse-temurin:21-jdk-alpine
    container_name: s3lite-backend
    working_dir: /app
    command: sh -c "chmod +x mvnw && ./mvnw spring-boot:run -Dspring-boot.run.jvmArguments='-Xms128m -Xmx512m -Dspring.devtools.restart.enabled=true -Dorg.apache.tomcat.util.buf.UDecoder.ALLOW_ENCODED_SLASH=true'"
    volumes:
      - ./s3lite-backend:/app
      - maven_cache:/root/.m2
      - s3_storage:/app/s3-data
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-s3lite}
      POSTGRES_USER: ${POSTGRES_USER:-s3lite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
      STORAGE_ROOT: /app/s3-data
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SPRING_PROFILES_ACTIVE: dev
      MAVEN_OPTS: "-Xms64m -Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - s3lite-net

  frontend:
    image: node:20-alpine
    container_name: s3lite-frontend
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm start"
    volumes:
      - ./s3lite-frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8080/api}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - s3lite-net

volumes:
  postgres_data:
    driver: local
  s3_storage:
    driver: local
  maven_cache:
    driver: local

networks:
  s3lite-net:
    driver: bridge
